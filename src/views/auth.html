<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.11.20/bundle/libphonenumber-min.js"></script>
</head>

<body class="bg-bg text-[#f0f0f0] min-h-screen flex flex-col text-sm leading-relaxed">

    <!-- NAVBAR -->
    <nav x-data x-init="$store.auth.init()" class="flex justify-between items-center px-10 py-5 border-b border-border">
        <a href="/" class="font-serif text-xl text-[#f0f0f0] no-underline">auth.</a>
        <div class="flex items-center gap-5">
            <template x-if="$store.auth.user">
                <div class="flex items-center gap-5">
                    <a href="/profile" class="text-accent no-underline hover:underline"
                       x-text="$store.auth.user.firstName"></a>
                    <button @click="$store.auth.logout('/')"
                            class="cursor-pointer font-mono text-sm bg-transparent text-[#f0f0f0] border border-border rounded px-3.5 py-1.5 hover:border-[#f0f0f0] transition-colors">
                        Logout
                    </button>
                </div>
            </template>
            <template x-if="!$store.auth.user">
                <div class="flex items-center gap-5">
                    <a href="/auth" class="text-accent no-underline hover:underline">Login</a>
                    <a href="/auth?activeTab=register"
                       class="cursor-pointer font-mono text-sm bg-transparent text-[#f0f0f0] border border-border rounded px-3.5 py-1.5 hover:border-[#f0f0f0] transition-colors no-underline">
                        Register
                    </a>
                </div>
            </template>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="flex-1 flex justify-center items-center px-5 py-16">

        <div x-data="authPage" class="w-full max-w-[440px] bg-surface border border-border rounded-xl p-10">

            <!-- Error -->
            <div x-show="$store.auth.errorMessage" x-cloak class="mb-4 px-3.5 py-2.5 rounded text-[13px] bg-[#2a1010] text-danger border border-danger">
                <div x-text="$store.auth.errorMessage"></div>
                <template x-if="$store.auth.errorMessage === 'Email not verified'">
                    <a href="#" @click.prevent="resendEmailVerification()" class="block mt-2 text-accent hover:underline">
                        Resend verification email
                    </a>
                </template>
            </div>

            <!-- Success -->
            <div x-show="$store.auth.successMessage" x-cloak class="mb-4 px-3.5 py-2.5 rounded text-[13px] bg-[#102a1a] text-ok border border-ok">
                <div x-text="$store.auth.successMessage"></div>
            </div>


            <!-- ── LOGIN ── -->
            <div x-show="activeTab === 'login'" x-cloak>
                <form @submit.prevent="login" class="flex flex-col gap-4">
                    <h2 class="font-serif text-[28px] mb-2">Welcome back.</h2>

                    <div class="flex flex-col gap-1.5">
                        <label for="login-email" class="text-[11px] text-muted uppercase tracking-wider">Email</label>
                        <input id="login-email" type="email" x-model="email"
                               placeholder="you@example.com" required autocomplete="email"
                               class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        <div x-show="email && !isValidEmail(email)" x-cloak class="text-danger text-[13px] mt-1">
                            Please enter a valid email address
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="login-password" class="text-[11px] text-muted uppercase tracking-wider">Password</label>
                        <input id="login-password" type="password" x-model="password"
                               placeholder="••••••••" required autocomplete="current-password"
                               class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                    </div>

                    <button type="submit" :disabled="!isValidEmail(email) || !password"
                            class="w-full mt-1 cursor-pointer font-mono text-sm bg-accent text-bg font-medium rounded px-5 py-3 hover:opacity-85 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
                        Sign in →
                    </button>

                    <p class="text-center text-muted text-[13px]">
                        Forgot your password?
                        <a href="#" @click.prevent="activeTab = 'reset-password'; resetAlerts()" class="text-accent hover:underline">Reset it</a>
                    </p>
                    <p class="text-center text-muted text-[13px]">
                        Don't have an account?
                        <a href="#" @click.prevent="activeTab = 'register'; resetAlerts()" class="text-accent hover:underline">Sign up</a>
                    </p>
                </form>
            </div>


            <!-- ── REGISTER ── -->
            <div x-show="activeTab === 'register'" x-cloak>
                <form @submit.prevent="register" class="flex flex-col gap-4">
                    <h2 class="font-serif text-[28px] mb-2">Create an account.</h2>

                    <div class="flex gap-3">
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="firstName" class="text-[11px] text-muted uppercase tracking-wider">First name</label>
                            <input id="firstName" type="text" x-model="firstName"
                                   placeholder="First name" required autocomplete="given-name"
                                   class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        </div>
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="lastName" class="text-[11px] text-muted uppercase tracking-wider">Last name</label>
                            <input id="lastName" type="text" x-model="lastName"
                                   placeholder="Last name" required autocomplete="family-name"
                                   class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="register-email" class="text-[11px] text-muted uppercase tracking-wider">Email</label>
                        <input id="register-email" type="email" x-model="email"
                               placeholder="Email address" required autocomplete="email"
                               class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        <div x-show="email && !isValidEmail(email)" x-cloak class="text-danger text-[13px] mt-1">
                            Please enter a valid email address
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="register-password" class="text-[11px] text-muted uppercase tracking-wider">Password</label>
                        <input id="register-password" type="password" x-model="password"
                               placeholder="Create a password" required autocomplete="new-password"
                               class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        <div x-show="password && !isValidPassword()" x-cloak class="text-danger text-[13px] mt-1">
                            <div x-html="passwordRequirements().replace(/\n/g, '<br>')"></div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="confirm-password" class="text-[11px] text-muted uppercase tracking-wider">Confirm password</label>
                        <input id="confirm-password" type="password" x-model="confirmPassword"
                               placeholder="Confirm your password" required autocomplete="new-password"
                               class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        <div x-show="confirmPassword && password !== confirmPassword" x-cloak class="text-danger text-[13px] mt-1">
                            Passwords do not match
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="countryCode" class="text-[11px] text-muted uppercase tracking-wider">Country</label>
                            <select id="countryCode" x-model="country" required
                                    class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors cursor-pointer appearance-none">
                                <option value="" disabled>Select country…</option>
                                <template x-for="c in countries" :key="c.code">
                                    <option :value="c.code" x-text="`${c.code} (${c.dial})`"></option>
                                </template>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="phoneNumber" class="text-[11px] text-muted uppercase tracking-wider">Phone number</label>
                            <input id="phoneNumber" type="tel" x-model="phoneNumber"
                                   placeholder="Phone number" required autocomplete="tel"
                                   class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                            <div x-show="phoneNumber && !phoneValid()" x-cloak class="text-danger text-[13px] mt-1">
                                Please enter a valid phone number
                            </div>
                        </div>
                    </div>

                    <button type="submit"
                            :disabled="!isValidEmail(email) || !isValidPassword() || password !== confirmPassword || !phoneValid()"
                            class="w-full mt-1 cursor-pointer font-mono text-sm bg-accent text-bg font-medium rounded px-5 py-3 hover:opacity-85 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
                        Create account →
                    </button>

                    <p class="text-center text-muted text-[13px]">
                        Already have an account?
                        <a href="#" @click.prevent="activeTab = 'login'; resetAlerts()" class="text-accent hover:underline">Sign in</a>
                    </p>
                </form>
            </div>


            <!-- ── RESET PASSWORD ── -->
            <div x-show="activeTab === 'reset-password'" x-cloak>
                <template x-if="!resetPasswordToken">
                    <form @submit.prevent="requestPasswordReset()" class="flex flex-col gap-4">
                        <h2 class="font-serif text-[28px] mb-2">Reset your password.</h2>

                        <p class="text-muted text-[13px]">Enter your email and we'll send a reset link.</p>

                        <div class="flex flex-col gap-1.5">
                            <label for="reset-email" class="text-[11px] text-muted uppercase tracking-wider">Email</label>
                            <input id="reset-email" type="email" x-model="email"
                                placeholder="Email address" required autocomplete="email"
                                class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                        </div>

                        <button type="submit"
                                class="w-full mt-1 cursor-pointer font-mono text-sm bg-accent text-bg font-medium rounded px-5 py-3 hover:opacity-85 transition-opacity">
                            Send reset link →
                        </button>

                        <p class="text-center text-muted text-[13px]">
                            Remembered it?
                            <a href="#" @click.prevent="activeTab = 'login'; resetAlerts()" class="text-accent hover:underline">Sign in</a>
                        </p>
                    </form>
                </template>
                <template x-if="resetPasswordToken">
                    <form @submit.prevent="resetPassword()" class="flex flex-col gap-4">
                        <h2 class="font-serif text-[28px] mb-2">Choose a new password.</h2>
                        
                        <div class="flex flex-col gap-1.5">
                            <label for="new-password" class="text-[11px] text-muted uppercase tracking-wider">New password</label>
                            <input id="new-password" type="password" x-model="password"
                                placeholder="Create a new password" required autocomplete="new-password"
                                class="w-full bg-bg border border-border rounded text-[#f0f0f0] font-mono text-sm px-3.5 py-2.5 outline-none focus:border-accent transition-colors">
                            <div x-show="password && !isValidPassword()" x-cloak class="text-danger text-[13px] mt-1">
                                <div x-html="passwordRequirements().replace(/\n/g, '<br>')"></div>
                            </div>
                        </div>

                        <button type="submit"
                                :disabled="!isValidPassword()"
                                class="w-full mt-1 cursor-pointer font-mono text-sm bg-accent text-bg font-medium rounded px-5 py-3 hover:opacity-85 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
                            Reset password →
                        </button>

                        <p class="text-center text-muted text-[13px]">
                            Remembered it?
                            <a href="#" @click.prevent="activeTab = 'login'; resetAlerts()" class="text-accent hover:underline">Sign in</a>
                        </p>
                    </form>
                </template>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="text-center py-5 text-muted text-xs border-t border-border">
        &copy; <span x-data x-text="new Date().getFullYear()"></span> — Your App
    </footer>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('authPage', () => ({
                activeTab: new URLSearchParams(window.location.search).get('activeTab') || 'login',
                passwordChanged: new URLSearchParams(window.location.search).get('passwordChanged') === 'true',

                firstName: '',
                lastName: '',
                email: '',
                password: '',
                confirmPassword: '',
                country: '',
                phoneNumber: '',

                resetPasswordToken: new URLSearchParams(window.location.search).get('token') || '',

                countries: libphonenumber.getCountries()
                    .map(code => ({ code, dial: '+' + libphonenumber.getCountryCallingCode(code) }))
                    .sort((a, b) => a.code.localeCompare(b.code)),

                init() {
                    if(this.passwordChanged) {
                        this.$store.auth.successMessage = 'Password changed successfully. Please log in with your new password.'
                    }
                },

                resetAlerts() {
                    this.$store.auth.errorMessage = ''
                    this.$store.auth.successMessage = ''
                },

                isValidEmail(email) {
                    return /\S+@\S+\.\S+/.test(email)
                },

                isValidPassword() {
                    return this.password.length >= 8
                        && /[A-Z]/.test(this.password)
                        && /[a-z]/.test(this.password)
                        && /[0-9]/.test(this.password)
                        && /[^A-Za-z0-9]/.test(this.password)
                },

                passwordRequirements() {
                    let msg = 'Password needs at least:'
                    if (this.password.length < 8)         msg += '\n- 8 characters'
                    if (!/[A-Z]/.test(this.password))     msg += '\n- 1 uppercase letter'
                    if (!/[a-z]/.test(this.password))     msg += '\n- 1 lowercase letter'
                    if (!/[0-9]/.test(this.password))     msg += '\n- 1 number'
                    if (!/[^A-Za-z0-9]/.test(this.password)) msg += '\n- 1 symbol'
                    return msg
                },

                phoneValid() {
                    if (!this.country || !this.phoneNumber) return null
                    try {
                        return libphonenumber.parsePhoneNumber(this.phoneNumber, this.country).isValid()
                    } catch { return false }
                },

                login() {
                    this.$store.auth.login(this.email, this.password, '/profile')
                },

                register() {
                    this.$store.auth.register(
                        this.firstName, this.lastName,
                        `${this.firstName} ${this.lastName}`,
                        this.email, this.password,
                        this.country, this.phoneNumber
                    )
                    this.activeTab = 'login'
                },

                resendEmailVerification() {
                    this.$store.auth.resendEmailVerification(this.email)
                },

                requestPasswordReset() {
                    this.$store.auth.requestPasswordReset(this.email)
                    this.activeTab = 'login'
                },

                resetPassword() {
                    this.$store.auth.resetPassword(this.resetPasswordToken, this.password)
                    this.activeTab = 'login'
                    this.password = ''
                }
            }))
        })
    </script>

</body>
</html>
